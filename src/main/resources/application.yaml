spring:
  application:
    name: boilerplate

  security:
    user:
      name: admin
      password: $2a$12$SCZNJYK6GK3nSgcJRhbtYusoiEEhi01xOS7.1FCNO6jo8CKqjgdU.

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boilerplate}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

jwt:
  access-private-key-path: keys/access-private.pem
  access-public-key-path: keys/access-public.pem
  refresh-private-key-path: keys/refresh-private.pem
  refresh-public-key-path: keys/refresh-public.pem
  access-token-exp: 900
  refresh-token-exp: 2592000
